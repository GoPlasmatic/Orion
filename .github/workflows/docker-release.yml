name: Docker Release

permissions:
  contents: read
  packages: write

on:
  # Trigger on version tags (same pattern as release.yml)
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"
  # Allow manual trigger with options
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build but don't push)"
        type: boolean
        default: false
      tag_override:
        description: "Version tag override (e.g. 0.1.0)"
        type: string
        required: false

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-22.04
    env:
      GHCR_IMAGE: ghcr.io/goplasmatic/orion
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.tag_override }}" ]; then
            VERSION="${{ inputs.tag_override }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            # Strip leading 'v' if present
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-${GITHUB_SHA::8}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=sha,prefix=
          flavor: |
            latest=auto

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ !inputs.dry_run }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Mirror to ACR if credentials are available
      - name: Login to Azure Container Registry
        if: ${{ !inputs.dry_run && env.ACR_URL != '' }}
        uses: docker/login-action@v3
        env:
          ACR_URL: ${{ secrets.ACR_URL }}
        with:
          registry: ${{ secrets.ACR_URL }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Mirror to ACR
        if: ${{ !inputs.dry_run && env.ACR_URL != '' }}
        env:
          ACR_URL: ${{ secrets.ACR_URL }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ACR_IMAGE="${ACR_URL}/orion"
          # Copy multi-arch manifest from GHCR to ACR
          docker buildx imagetools create \
            --tag "${ACR_IMAGE}:${VERSION}" \
            "${{ env.GHCR_IMAGE }}:${VERSION}"
          docker buildx imagetools create \
            --tag "${ACR_IMAGE}:latest" \
            "${{ env.GHCR_IMAGE }}:${VERSION}"
