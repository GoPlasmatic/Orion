[package]
name = "orion"
version = "0.1.0"
edition = "2024"
description = "Standalone rules engine service wrapping dataflow-rs"
license = "Apache-2.0"

[[bin]]
name = "orion"
path = "src/main.rs"

[lib]
name = "orion"
path = "src/lib.rs"

[dependencies]
dataflow-rs = "2.1.1"
axum = "0.8"
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "migrate", "chrono", "uuid"] }
tower-http = { version = "0.6", features = ["trace", "cors", "request-id", "propagate-header"] }
toml = "0.8"
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
async-trait = "0.1"
datalogic-rs = "4"
metrics = "0.24"
metrics-exporter-prometheus = "0.16"
rdkafka = { version = "0.36", features = ["cmake-build"], optional = true }

[dev-dependencies]
tower = "0.5"

[features]
default = []
kafka = ["rdkafka"]
