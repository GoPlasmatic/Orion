[package]
name = "orion"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Standalone rules engine service wrapping dataflow-rs"
license = "Apache-2.0"
repository = "https://github.com/GoPlasmatic/Orion"
homepage = "https://github.com/GoPlasmatic/Orion"

[[bin]]
name = "orion"
path = "src/main.rs"

[[bin]]
name = "orion-cli"
path = "src/cli/main.rs"
required-features = ["cli"]

[lib]
name = "orion"
path = "src/lib.rs"

[dependencies]
dataflow-rs = "2.1.1"
axum = { version = "0.8", default-features = false, features = ["http1", "json", "query", "tokio", "tracing"] }
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio", "sqlite", "migrate", "macros", "chrono", "uuid"] }
tower-http = { version = "0.6", features = ["trace", "cors", "request-id", "propagate-header"] }
toml = "0.8"
clap = { version = "4", features = ["derive", "env"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "default-tls"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "time", "signal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
async-trait = "0.1"
datalogic-rs = "4"
metrics = "0.24"
metrics-exporter-prometheus = { version = "0.16", default-features = false }
rdkafka = { version = "0.36", features = ["cmake-build"], optional = true }
utoipa = { version = "5", features = ["axum_extras", "chrono"] }
utoipa-swagger-ui = { version = "9", features = ["axum"], optional = true }

# OpenTelemetry (gated behind `otel` feature)
opentelemetry = { version = "0.28", optional = true }
opentelemetry_sdk = { version = "0.28", features = ["rt-tokio"], optional = true }
opentelemetry-otlp = { version = "0.28", features = ["grpc-tonic"], optional = true }
tracing-opentelemetry = { version = "0.29", optional = true }

# CLI-only dependencies (gated behind `cli` feature)
colored = { version = "3", optional = true }
tabled = { version = "0.18", optional = true }
dirs = { version = "6", optional = true }
serde_yaml = { version = "0.9", optional = true }
clap_complete = { version = "4", optional = true }
anyhow = { version = "1", optional = true }

[dev-dependencies]
tower = "0.5"

[features]
default = ["swagger-ui"]
swagger-ui = ["utoipa-swagger-ui"]
cli = ["colored", "tabled", "dirs", "serde_yaml", "clap_complete", "anyhow"]
kafka = ["rdkafka"]
otel = ["dep:opentelemetry", "dep:opentelemetry_sdk", "dep:opentelemetry-otlp", "dep:tracing-opentelemetry"]

[profile.release]
strip = true
lto = "thin"
codegen-units = 1
panic = "abort"

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = true
