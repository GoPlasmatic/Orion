<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orion Architectural Characteristics</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f6fa; overflow: hidden; width: 100vw; height: 100vh;
    }
    #app { position: fixed; inset: 0; }
    svg { display: block; width: 100%; height: 100%; }
    .link { fill: none; stroke: #b2bec3; stroke-width: 1.8; stroke-linecap: round; }
    .node text { pointer-events: none; }
    .node.clickable { cursor: pointer; }
    .node.clickable:hover .node-bg { filter: brightness(0.94) drop-shadow(0 3px 8px rgba(0,0,0,0.13)); }
    .node-bg { transition: filter 0.15s ease; }
    #header {
      position: fixed; top: 0; left: 0; right: 0; text-align: center;
      padding: 14px 24px 10px;
      background: linear-gradient(180deg, #f5f6fa 60%, transparent);
      z-index: 10; pointer-events: none;
    }
    #header h1 { font-size: 22px; font-weight: 700; color: #2d3436; letter-spacing: -0.4px; }
    #legend {
      position: fixed; top: 46px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 16px; z-index: 10; pointer-events: none;
      font-size: 10px; color: #636e72;
    }
    #legend .b { display: inline-flex; align-items: center; gap: 5px; }
    #legend .d {
      width: 20px; height: 20px; border-radius: 50%;
      border: 1.5px dashed; background: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700;
    }
    #hint {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #b2bec3; background: rgba(255,255,255,0.9);
      padding: 4px 12px; border-radius: 14px; z-index: 10;
    }
  </style>
</head>
<body>
  <div id="header"><h1>Orion Architectural Characteristics</h1></div>
  <div id="legend">
    <span class="b"><span class="d" style="border-color:#e17055;color:#e17055">C</span>Creational</span>
    <span class="b"><span class="d" style="border-color:#6c5ce7;color:#6c5ce7">S</span>Structural</span>
    <span class="b"><span class="d" style="border-color:#00b894;color:#00b894">B</span>Behavioral</span>
  </div>
  <div id="hint">Scroll to zoom · Drag to pan · Click to collapse</div>
  <div id="app"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
  (async function () {

    let features;
    try { features = await fetch('./features.json').then(r => r.json()); }
    catch (e) {
      document.getElementById('app').innerHTML =
        '<p style="text-align:center;margin-top:40vh;color:#636e72">Could not load features.json<br><code style="font-size:12px">python3 -m http.server 8000</code></p>';
      return;
    }
    if (features.title) document.querySelector('#header h1').textContent = features.title;

    const TYPE_COLORS = { C: '#e17055', S: '#6c5ce7', B: '#00b894' };

    /* ═══ DATA ═══ */
    function makeNode(cat) {
      return {
        _id: cat.name, name: cat.name, color: cat.color, border: cat.border,
        catType: cat.type, lvl: 1, _c: null,
        children: cat.children.map(sub => ({
          _id: cat.name + '/' + sub.name, name: sub.name,
          color: cat.color, border: cat.border, lvl: 2,
          children: null,
          _c: (sub.children || []).map(leaf => ({
            _id: cat.name + '/' + sub.name + '/' + leaf, name: leaf,
            color: cat.color, border: cat.border, lvl: 3
          }))
        }))
      };
    }
    const cats = features.categories.map(makeNode);
    const leftCats = cats.slice(0, 4);
    const rightCats = cats.slice(4);

    /* ═══ SVG ═══ */
    const W = window.innerWidth, H = window.innerHeight;
    const svg = d3.select('#app').append('svg').attr('width', W).attr('height', H);
    const g = svg.append('g');
    const zoomBeh = d3.zoom().scaleExtent([0.1, 3]).on('zoom', e => g.attr('transform', e.transform));
    svg.call(zoomBeh);

    const defs = g.append('defs');
    [['shadow', 2, 4, 0.10], ['shadow-sm', 1, 2.5, 0.06]].forEach(([id, dy, sd, op]) => {
      const f = defs.append('filter').attr('id', id)
        .attr('x', '-25%').attr('y', '-25%').attr('width', '150%').attr('height', '150%');
      f.append('feDropShadow').attr('dx', 0).attr('dy', +dy)
        .attr('stdDeviation', +sd).attr('flood-color', `rgba(0,0,0,${op})`);
    });

    // Z-order: links first, then badges, then nodes (nodes always on top)
    const gLinks = g.append('g');
    const gBadges = g.append('g');
    const gNodes = g.append('g');

    /* ═══ LAYOUT ═══ */
    const linkH = d3.linkHorizontal().x(d => d[0]).y(d => d[1]);
    const SIB = 36;
    const DEPTH = 185;
    const CAT_GAP = 50;

    function computeAll() {
      const nodes = [], links = [], badges = [];
      nodes.push({ _id: '__center__', name: 'Orion', x: 0, y: 0, lvl: 0, parentId: null });

      function doSide(catArr, xSign) {
        const metas = catArr.map(cat => {
          const root = d3.hierarchy(cat, d => d.children);
          d3.tree().nodeSize([SIB, DEPTH])(root);
          const ys = root.descendants().map(d => d.x);
          return { cat, root, minY: d3.min(ys), maxY: d3.max(ys), h: d3.max(ys) - d3.min(ys) };
        });

        let cursor = 0;
        const offsets = [];
        metas.forEach(m => { offsets.push(cursor - m.minY); cursor += m.h + CAT_GAP; });
        const totalH = cursor - CAT_GAP;
        const yShift = -totalH / 2;

        metas.forEach((m, mi) => {
          const yOff = offsets[mi] + yShift;
          m.root.descendants().forEach(d => {
            const data = d.data;
            const sx = xSign * (d.y + 160);
            const sy = d.x + yOff;
            const parentId = d.depth === 0 ? '__center__' : d.parent.data._id;
            const px = d.depth === 0 ? 0 : xSign * (d.parent.y + 160);
            const py = d.depth === 0 ? 0 : d.parent.x + yOff;

            nodes.push({
              _id: data._id, name: data.name, x: sx, y: sy,
              lvl: data.lvl, color: data.color, border: data.border,
              catType: data.catType, parentId,
              hasKids: !!(data.children || data._c),
              expanded: !!data.children, data
            });
            links.push({ _id: 'l:' + data._id, sourceId: parentId, sx: px, sy: py, tx: sx, ty: sy });

            if (data.lvl === 1 && data.catType)
              badges.push({ _id: 'b:' + data._id, type: data.catType, x: (px + sx) / 2, y: (py + sy) / 2 });
          });
        });
      }

      doSide(leftCats, -1);
      doSide(rightCats, 1);
      return { nodes, links, badges };
    }

    /* ═══ RENDER ═══ */
    function render(animate) {
      const { nodes, links, badges } = computeAll();
      const dur = animate ? 400 : 0;
      const t = dur ? d3.transition().duration(dur).ease(d3.easeCubicOut) : null;
      function tr(s) { return t ? s.transition(t) : s; }

      // Links
      const lS = gLinks.selectAll('.link').data(links, d => d._id);
      tr(lS.exit()).attr('opacity', 0).remove();
      const lE = lS.enter().append('path').attr('class', 'link').attr('opacity', 0)
        .attr('d', d => linkH({ source: [0, 0], target: [0, 0] }));
      tr(lE.merge(lS)).attr('d', d => linkH({ source: [d.sx, d.sy], target: [d.tx, d.ty] })).attr('opacity', 0.5);

      // Badges
      const bS = gBadges.selectAll('.type-badge').data(badges, d => d._id);
      bS.exit().remove();
      const bE = bS.enter().append('g').attr('class', 'type-badge');
      bE.append('circle'); bE.append('text').attr('text-anchor', 'middle').attr('dominant-baseline', 'central').attr('pointer-events', 'none');
      const bA = bE.merge(bS);
      bA.each(function (d) {
        const el = d3.select(this), col = TYPE_COLORS[d.type] || '#999';
        el.select('circle').attr('r', 10).attr('fill', '#fff').attr('stroke', col).attr('stroke-width', 1.5).attr('stroke-dasharray', '3 2');
        el.select('text').attr('font-size', 8).attr('font-weight', 700).attr('fill', col).attr('font-family', "'Inter',sans-serif").text(d.type);
      });
      tr(bA).attr('transform', d => `translate(${d.x},${d.y})`).attr('opacity', 1);

      // Nodes — always on top
      const nS = gNodes.selectAll('.node').data(nodes, d => d._id);
      tr(nS.exit()).attr('transform', d => {
        const p = nodes.find(n => n._id === d.parentId) || { x: 0, y: 0 };
        return `translate(${p.x},${p.y})`;
      }).attr('opacity', 0).remove();
      const nE = nS.enter().append('g').attr('class', 'node').attr('opacity', 0)
        .attr('transform', 'translate(0,0)');
      nE.append('rect').attr('class', 'node-bg');
      nE.append('text').attr('text-anchor', 'middle').attr('dominant-baseline', 'central');
      // Expand chevron indicator
      nE.append('text').attr('class', 'expand-hint')
        .attr('dominant-baseline', 'central').attr('pointer-events', 'none');
      const nA = nE.merge(nS);
      nA.classed('clickable', d => d.hasKids);

      nA.each(function (d) {
        const el = d3.select(this);
        const L = d.lvl;
        const fs = [15, 12, 10.5, 9.5][L];
        const fw = [700, 700, 600, 500][L];
        const tc = L === 0 ? '#fff' : '#2d3436';
        const txt = el.select('text').attr('font-size', fs).attr('font-weight', fw).attr('fill', tc)
          .attr('font-family', "'Inter',sans-serif").text(d.name);
        const tw = txt.node().getComputedTextLength();
        const px = [26, 12, 9, 7][L], py = [11, 7, 5, 4][L];
        const rw = tw + px * 2, rh = fs + py * 2, rx = [8, 5, 4, 4][L];
        // Blend color with white for opaque lighter fills (so links don't show through)
        function blendWhite(hex, amount) {
          const c = d3.color(hex);
          return d3.rgb(
            Math.round(c.r + (255 - c.r) * amount),
            Math.round(c.g + (255 - c.g) * amount),
            Math.round(c.b + (255 - c.b) * amount)
          ) + '';
        }
        let fill, stroke;
        if (L === 0) { fill = '#6C5CE7'; stroke = '#5A4BD1'; }
        else if (L === 1) { fill = d.color; stroke = d.border; }
        else if (L === 2) { fill = blendWhite(d.color, 0.6); stroke = d.border; }
        else { fill = blendWhite(d.color, 0.78); stroke = d.border; }
        el.select('rect').attr('x', -rw / 2).attr('y', -rh / 2).attr('width', rw).attr('height', rh)
          .attr('rx', rx).attr('ry', rx).attr('fill', fill).attr('stroke', stroke)
          .attr('stroke-width', L === 0 ? 2.5 : L === 1 ? 1.8 : 1.2)
          .attr('stroke-dasharray', L === 3 ? '4 3' : null)
          .attr('filter', L <= 1 ? 'url(#shadow)' : L === 2 ? 'url(#shadow-sm)' : null);

        // Chevron hint — only on collapsed nodes that have hidden children
        const hint = el.select('.expand-hint');
        const collapsed = d.hasKids && !d.expanded;
        if (collapsed && L > 0) {
          const isLeft = d.x < 0;
          hint
            .attr('x', isLeft ? -rw / 2 - 4 : rw / 2 + 4)
            .attr('y', 1)
            .attr('text-anchor', isLeft ? 'end' : 'start')
            .attr('font-size', 12).attr('font-weight', 600)
            .attr('fill', d.border || '#b2bec3')
            .attr('font-family', "'Inter',sans-serif")
            .text(isLeft ? '‹' : '›')
            .attr('opacity', 0.7);
        } else {
          hint.attr('opacity', 0).text('');
        }
      });

      tr(nA).attr('transform', d => `translate(${d.x},${d.y})`).attr('opacity', 1);

      // Force z-order: links behind everything, nodes on top
      gLinks.each(function() { g.node().insertBefore(this, g.node().firstChild); });
      gBadges.raise();
      gNodes.raise();

      // Click — re-render only, NO auto-zoom
      nA.on('click', null);
      nA.filter(d => d.hasKids).on('click', (_, d) => {
        const data = d.data;
        if (data.children) { data._c = data.children; data.children = null; }
        else { data.children = data._c; data._c = null; }
        render(true);
      });
    }

    /* ═══ FIT TO WIDTH — initial zoom only, then user is in control ═══ */
    function fitToWidth() {
      const box = g.node().getBBox();
      if (!box.width || !box.height) return;
      const pad = 50;
      const w = window.innerWidth, h = window.innerHeight;
      // Scale to fit WIDTH, center horizontally, center vertically as best we can
      const s = (w - pad * 2) / box.width;
      const cx = box.x + box.width / 2;
      const cy = box.y + box.height / 2;
      svg.call(zoomBeh.transform,
        d3.zoomIdentity.translate(w / 2 - cx * s, h / 2 - cy * s).scale(s)
      );
    }

    render(false);
    requestAnimationFrame(fitToWidth);

    window.addEventListener('resize', () => {
      svg.attr('width', window.innerWidth).attr('height', window.innerHeight);
    });
  })();
  </script>
</body>
</html>
